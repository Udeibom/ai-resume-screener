version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: resume_screener_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: resume_screener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: resume_screener_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination /mlflow
      --serve-artifacts
    restart: always

volumes:
  pgdata:
  mlflow_data: